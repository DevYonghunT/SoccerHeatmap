name: KickoffNative
options:
  bundleIdPrefix: com.kickoff
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Kickoff/Info.plist
    DEVELOPMENT_TEAM: ""

targets:
  Kickoff:
    type: application
    platform: iOS
    sources:
      - path: Kickoff
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kickoff.app
        INFOPLIST_FILE: Kickoff/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: Kickoff/Kickoff.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
